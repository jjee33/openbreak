apiVersion: v1
kind: Service
metadata:
  name: openbreak-postgres
  namespace: openbreak
  labels:
    app.kubernetes.io/name: openbreak
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: openbreak
    app.kubernetes.io/component: database
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
