apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openbreak-postgres
  namespace: openbreak
  labels:
    app.kubernetes.io/name: openbreak
    app.kubernetes.io/component: database
spec:
  serviceName: openbreak-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openbreak
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openbreak
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: openbreak
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: openbreak-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openbreak-secrets
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - openbreak
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - openbreak
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: openbreak-postgres-data
