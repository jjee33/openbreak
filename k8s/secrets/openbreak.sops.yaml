# SOPS-encrypted Kubernetes Secret for OpenBreak
# To encrypt: sops --encrypt --age <AGE_PUBLIC_KEY> --in-place k8s/secrets/openbreak.sops.yaml
# Replace CHANGEME values before encrypting
apiVersion: v1
kind: Secret
metadata:
  name: openbreak-secrets
  namespace: openbreak
  labels:
    app.kubernetes.io/name: openbreak
type: Opaque
stringData:
  DATABASE_URL: "postgresql://openbreak:CHANGEME@openbreak-postgres.openbreak.svc.cluster.local:5432/openbreak"
  AUTH_SECRET: "CHANGEME"
  NEXTAUTH_SECRET: "CHANGEME"
  POSTGRES_USER: "openbreak"
  POSTGRES_PASSWORD: "CHANGEME"
